# reload tmux
unbind r
bind r source-file ~/.tmux.conf

# binding for tmux
set -g prefix C-Space

# reduce esc press time
set -sg escape-time 0

# better pane resizing binds
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

set -g mouse on
setw -g mode-keys vi

# change status position
set-option -g status-position top

# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"
# Split panes vertically in the current directory
bind '"' split-window -v -c "#{pane_current_path}"
# Split panes horizontally in the current directory
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# Tokyo night plugin
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @theme_variation 'night'
set -g @theme_plugins 'datetime,cpu,memory,nowplaying,git'

# vim navigation in tmux
set -g @plugin 'christoomey/vim-tmux-navigator'

# copy from wsl
set -g @plugin 'tmux-plugins/tmux-yank'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Tell tmux to support 24-bit color
set -ag terminal-overrides ",xterm-256color:RGB"

# You might also need this default
set -g default-terminal "tmux-256color"
